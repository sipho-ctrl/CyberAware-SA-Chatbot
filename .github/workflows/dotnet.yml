name: .NET Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
        
    - name: List directory structure
      run: dir /s /b
      
    - name: Find csproj file
      id: find
      run: |
        for /r . %%i in (*.csproj) do echo "PROJECT=%%i" >> $env:GITHUB_OUTPUT
      shell: cmd
        
    - name: Restore dependencies
      run: dotnet restore *.csproj
      
    - name: Build project
      run: dotnet build *.csproj --no-restore --configuration Release
